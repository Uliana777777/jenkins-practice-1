name: Playwright Tests

on:
  # push:
  #   branches:
  #     - main
  #     - master
  #     - develop
  # pull_request:
  #   branches:
  #     - main
  #     - master
  #     - develop
  schedule:
    - cron: "0 13 * * *" # Runs at 13:00 UTC (8 AM EST)
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    permissions:
      contents: write
#Set up NodeJS version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      
      
  #configuring environment variables Example   
      - name: Configure environment variables from secrets
        run: |
          echo "PRACTICE_USERNAME=${{ secrets.PRACTICE_USERNAME }}" >> .env
          echo "PRACTICE_PASSWORD=${{ secrets.PRACTICE_PASSWORD }}" >> .env

  - name: Run Playwright tests
    run: npm run tests:headless

  - name: Upload Playwright HTML report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: playwright-report
      path: playwright-report/
      retention-days: 30